name: CI Backend

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run lint
        run: |
          pip install flake8
          flake8 backend || true
      - name: Run simple smoke test
        run: |
          python -c "import importlib, sys; sys.path.append('backend'); import app.main; print('ok')"
          
