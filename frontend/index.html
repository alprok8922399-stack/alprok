<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Минимальный чат ИИ</title>
  <style>
    body{font-family:Arial;max-width:700px;margin:2rem auto;padding:1rem}
    #messages{border:1px solid #ddd;padding:1rem;height:300px;overflow:auto;margin-bottom:1rem}
    .msg.user{color:#063; margin:0.5rem 0}
    .msg.bot{color:#036; margin:0.5rem 0}
  </style>
</head>
<body>
  <h3>Минимальный чат ИИ</h3>
  <div id="messages"></div>
  <textarea id="input" rows="3" style="width:100%"></textarea>
  <button id="send">Отправить</button>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function append(role, text){
      const d = document.createElement('div');
      d.className = 'msg ' + (role==='user' ? 'user' : 'bot');
      d.textContent = (role==='user' ? 'Вы: ' : 'ИИ: ') + text;
      messagesEl.appendChild(d);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function send(){
      const message = inputEl.value.trim();
      if(!message) return;
      append('user', message);
      inputEl.value = '';
      append('bot', '...');

      try{
        const res = await fetch('/chat', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({message})
        });
        const data = await res.json();
        // Replace last bot "..." with actual reply
        const botEls = messagesEl.querySelectorAll('.msg.bot');
        if(botEls.length) botEls[botEls.length-1].textContent = 'ИИ: ' + (data.reply || '[пустой ответ]');
      }catch(e){
        const botEls = messagesEl.querySelectorAll('.msg.bot');
        if(botEls.length) botEls[botEls.length-1].textContent = 'ИИ: Ошибка соединения';
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }});
  </script>
</body>
</html>
